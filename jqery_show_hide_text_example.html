<html lang="en">

  <body>
    <button id="btn">Hide</button>
    <p id="p1">Hello I am Ashok Basnet</p>

    <script>
      document.cookie = `name=Ashok; password=Ashok@1243 ;exprires=${new Date()} ;path=/`;
      $(document).ready(function () {
        $("#btn").click(function () {
          if ($("#p1").is(":visible")) {
