<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Validation</title>
  </head>
  <body>
    <form onsubmit="return validateForm(event);">
      <div>
        <label>Full Name:</label>
        <input type="text" id="fullname" />
      </div>

      <div>
        <label>Password:</label>
        <input type="password" id="password" />
      </div>

      <div>
        <label>Email:</label>
        <input type="text" id="email" />
      </div>

      <div>
        <label>Gender:</label>
        <input type="radio" name="gender" value="male" /> Male
        <input type="radio" name="gender" value="female" /> Female
      </div>

      <div>
        <label>Country:</label>
        <select id="country">
          <option value="">Select Country</option>
          <option>Nepal</option>
          <option>India</option>
          <option>USA</option>
        </select>
      </div>

      <div>
        <label>Date of Birth:</label>
        <input type="date" id="date" />
      </div>

      <div>
        <label>Phone Number:</label>
        <input type="text" id="phone" />
      </div>

      <input type="submit" value="Submit" />
      <p id="error" style="color: red"></p>
    </form>

    <script>
      function validateForm(e) {
        e.preventDefault();

        const fullname = document.getElementById("fullname").value.trim();
        const password = document.getElementById("password").value.trim();
        const email = document.getElementById("email").value.trim();
        const country = document.getElementById("country").value;
        const date = document.getElementById("date").value;
        const phone = document.getElementById("phone").value.trim();
        const gender = document.querySelector('input[name="gender"]:checked');
        const error = document.getElementById("error");

        error.textContent = "";

        // Full Name
        if (fullname.length < 3) {
          error.textContent = "Full name must be at least 3 characters.";
          return false;
        }

        // Password: 1 uppercase, 1 lowercase, 1 number, 1 symbol, min 8 chars
        const passPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/;
        if (!passPattern.test(password)) {
          error.textContent =
            "Password must have uppercase, lowercase, number, symbol and be 8+ characters.";
          return false;
        }

        // Email
        const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
        if (!email.match(emailPattern)) {
          error.textContent = "Enter valid email.";
          return false;
        }

        // Gender
        if (!gender) {
          error.textContent = "Please select gender.";
          return false;
        }

        // Country
        if (country === "") {
          error.textContent = "Please select country.";
          return false;
        }

        // Date
        if (date === "") {
          error.textContent = "Please select date.";
          return false;
        }

        // Phone number: exactly 10 digits
        const phonePattern = /^\d{10}$/;
        if (!phone.match(phonePattern)) {
          error.textContent = "Phone number must be 10 digits.";
          return false;
        }

        alert("Form submitted successfully!");
        return true;
      }
    </script>
  </body>
</html>
